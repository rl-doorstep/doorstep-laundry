<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" fill="none" stroke="#2d5a3d" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">

  <!-- House body: one stroke that stops where the bag occludes -->
  <polyline points="127,168 30,168 30,68 160,68 160,137"/>

  <!-- Roof: left slope + peak + right slope stops at chimney, resumes after -->
  <polyline points="20,70 95,12 124,34"/>
  <line x1="148" y1="53" x2="170" y2="70"/>

  <!-- Chimney -->
  <rect x="126" y="26" width="20" height="38"/>

  <!-- Left window -->
  <rect x="44" y="82" width="28" height="26" rx="1"/>
  <line x1="58" y1="82" x2="58" y2="108"/>
  <line x1="44" y1="95" x2="72" y2="95"/>

  <!-- Right window -->
  <rect x="118" y="82" width="28" height="26" rx="1"/>
  <line x1="132" y1="82" x2="132" y2="108"/>
  <line x1="118" y1="95" x2="146" y2="95"/>

  <!-- Door -->
  <rect x="72" y="112" width="46" height="56" rx="2"/>
  <circle cx="111" cy="142" r="3"/>

  <!-- Steps: stop before bag -->
  <line x1="58" y1="168" x2="127" y2="168"/>
  <line x1="50" y1="175" x2="130" y2="175"/>

  <!-- Laundry bag -->
  <path d="M 130 168
           Q 128 148, 138 140
           Q 148 134, 160 140
           Q 170 148, 168 168
           Q 168 180, 158 184
           Q 148 186, 140 184
           Q 130 180, 130 168 Z"/>
  <path d="M 138 141 Q 149 136, 160 141"/>
  <path d="M 145 137 Q 143 130, 145 127 Q 149 125, 149 129"/>
  <path d="M 153 137 Q 155 130, 153 127 Q 149 125, 149 129"/>
</svg>
